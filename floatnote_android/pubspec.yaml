name: floatnote_android
description: "灵签 FloatNote - 轻盈便签，记事本 & 待办事项 (Android)"
publish_to: 'none'
version: 1.2.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.5.0

  # 本地存储
  shared_preferences: ^2.2.0

  # 网络请求
  http: ^1.2.0

  # Markdown 渲染
  flutter_markdown: ^0.7.0

  # UI 增强
  flutter_slidable: ^3.0.0

  # 日期格式化
  intl: ^0.19.0

  # 文件操作（导入/导出）
  file_picker: ^8.0.0
  path_provider: ^2.1.0

  # Material Icons
  material_design_icons_flutter: ^7.0.7296

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
